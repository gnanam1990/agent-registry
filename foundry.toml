[profile.default]
src = "src"
out = "out"
libs = ["lib"]
test = "test"
solc = "0.8.24"
# Conservative EVM floor for Arc testnet — no PUSH0/transient-storage assumptions.
# Bump to "shanghai"/"cancun" only once Arc's supported EVM version is confirmed (Stage 4 deploy).
evm_version = "paris"
optimizer = true
optimizer_runs = 200
# Deterministic bytecode → clean source verification on the explorer later.
bytecode_hash = "none"
cbor_metadata = false
# No filesystem/network access from tests unless a stage explicitly needs it.
ffi = false

[fmt]
line_length = 100
tab_width = 4
bracket_spacing = true
int_types = "long"
quote_style = "double"
number_underscore = "thousands"
sort_imports = true

# RPC comes from env — never hardcode endpoints/keys.
[rpc_endpoints]
arc_testnet = "${ARC_RPC_URL}"

# See https://github.com/foundry-rs/foundry/blob/master/crates/config/README.md#all-options
